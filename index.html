<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Link Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* Dark background and centered layout */
    body {
      margin: 0;
      padding: 0;
      background-color: #080808; /* dark background */
      color: #ffffff;
      font-family: 'Source Code Pro', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;   /* ← top alignment */
      min-height: 100vh;         /* keeps body full height (optional) */
      padding-top: 1.5rem;       /* optional: a tiny breathing room from the top */
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 90%;
      padding: 2rem 1rem;
    }

    /* Large main title */
    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      color: #ffffff;
    }

    /* Smaller titles for each list */
    h2 {
      font-size: 1.5rem;
      margin: 2rem 0 1rem;
      color: #dddddd;
    }

    .lists-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
      margin-top: 1rem;
    }
    
    .left-list,
    .right-list {
      flex: 1;
      margin: 0;
      padding: 0;               /* just in case */
    }
    
    /* Titles – keep centered */
    .left-list h2,
    .right-list h2 {
      text-align: center;
      margin: 0 0 0.5rem 0;
    }
    
    /* The list itself – kill ALL default spacing */
    .button-list {
      list-style: none;
      margin: 0;
      padding: 0;               /* remove default left padding */
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;      /* horizontal centering for flex children */
      gap: 0.75rem;
    }
    
    /* List items – no default spacing */
    .button-list li {
      margin: 0;
      padding: 0;
      width: 100%;              /* let the <a> inside control the width */
      display: flex;
      justify-content: center;  /* fallback centering of inline content */
    }
    
    /* Buttons – no invisible auto margins, and a consistent box model */
    .btn {
      display: inline-block;    /* or block; both work */
      width: 100%;
      max-width: 300px;
      margin: 0;                /* ← critical: no auto margins on sides */
      padding: 12px 20px;
      background-color: #4a90e2;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      box-sizing: border-box;   /* padding doesn't add extra width */
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #357abd;
    }

    .left-list .button-list li:nth-child(1) .btn {
      background-color: #141414;
      color: #e3173c;
      outline: 2px solid #e3173c;
      outline-offset: 0px;
    }

    .right-list .button-list li:nth-child(1) .btn {
      background-color: #e7e7e7;
      color: #e3173c;
      outline: 2px solid #e3173c;
      outline-offset: 0px;
    }
    
    .list-two .btn {
      background-color: #e25c4a;
    }

    .list-two .btn:hover {
      background-color: #c0493a;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Large main title -->
    <h1>PARALLEL PSYCHOSIS 5</h1>

    <div class="lists-row">
      <section class="left-list">
        <h2>Characters</h2>
        <ul class="button-list">
          <li><a href="https://github.com" class="btn" target="_blank" rel="noopener">Deadline</a></li>
        </ul>
      </section>
      <section class="right-list">
        <h2>Spaces</h2>
        <ul class="button-list">
          <li><a href="https://github.com" class="btn" target="_blank" rel="noopener">Ω Entertainment</a></li>
        </ul>
      </section>
    </div>
  </div>
</body>
</html>
