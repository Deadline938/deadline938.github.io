<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Link Hub</title>
  <style>
    /* Dark background and centered layout */
    body {
      margin: 0;
      padding: 0;
      background-color: #080808; /* dark background */
      color: #ffffff;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 90%;
      padding: 2rem 1rem;
    }

    /* Large main title */
    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      color: #ffffff;
    }

    /* Smaller titles for each list */
    h2 {
      font-size: 1.5rem;
      margin: 2rem 0 1rem;
      color: #dddddd;
    }
    

    /* Button list styling */
    /* Main container stays the same – it keeps everything centered */
    /* New row container: puts the two sections next to each other */
    .button-list {
      list-style: none;
      padding-left: 0;             /* crucial – kills browser default padding */
      margin: 0;
      width: 100%;                 /* ensures the flex container spans the full column */
      display: flex;
      flex-direction: column;
      align-items: center;         /* centers flex items horizontally */
      gap: 0.75rem;
    }
    
    .lists-row {
      display: flex;
      justify-content: space-between;  /* one left, one right */
      align-items: flex-start;         /* top‑align the sections */
      gap: 2rem;                       /* optional space between */
      margin-top: 1rem;
    }
    
    /* Give each section a bit of width and remove default margins */
    .left-list,
    .right-list {
      flex: 1;
      margin: 0;
      text-align: center;          /* centers the h2 and any inline content */
    }

    .left-list h2,
    .right-list h2 {
      text-align: center;          /* explicit centering */
      margin-bottom: 0.5rem;
    }
    
    /* Button lists: align the columns of buttons to the corresponding side */
    .left-list .button-list {
      align-items: center;         /* buttons hug the left */
    }
    
    .right-list .button-list {
      align-items: center;           /* buttons hug the right */
    }

    /* Button links */
    .btn {
      display: inline-block;
      width: 100%;
      max-width: 300px;
      padding: 12px 20px;
      background-color: #4a90e2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #357abd;
    }

    /* Optional: second list could have slightly different style */
    .list-two .btn {
      background-color: #e25c4a;
    }

    .list-two .btn:hover {
      background-color: #c0493a;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Large main title -->
    <h1>PARALLEL PSYCHOSIS 1</h1>

    <div class="lists-row">
      <section class="left-list">
        <h2>Characters</h2>
        <ul class="button-list">
          <li><a href="https://github.com" class="btn" target="_blank" rel="noopener">GitHub</a></li>
          <li><a href="https://stackoverflow.com" class="btn" target="_blank" rel="noopener">Stack Overflow</a></li>
          <li><a href="https://developer.mozilla.org" class="btn" target="_blank" rel="noopener">MDN Web Docs</a></li>
        </ul>
      </section>
      <section class="right-list">
        <h2>Universes</h2>
        <ul class="button-list">
          <li><a href="https://github.com" class="btn" target="_blank" rel="noopener">GitHub</a></li>
          <li><a href="https://stackoverflow.com" class="btn" target="_blank" rel="noopener">Stack Overflow</a></li>
          <li><a href="https://developer.mozilla.org" class="btn" target="_blank" rel="noopener">MDN Web Docs</a></li>
        </ul>
      </section>
    </div>
  </div>
</body>
</html>
